# ══════════════════════════════════════════════════════════════════════════════
# config.yaml — Pipeline configuration
# Tunisia Groundwater Depletion Study
# ══════════════════════════════════════════════════════════════════════════════

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  data:
    grace:       "data/grace/"          # CSR, JPL, GFZ mascon NetCDF files
    gldas_noah:  "data/gldas/noah/"     # GLDAS NOAH v2.2 NetCDF
    gldas_vic:   "data/gldas/vic/"      # GLDAS VIC NetCDF
    era5:        "data/era5/"           # ERA5 P + T2m NetCDF
    modis:       "data/modis/"          # MOD13A3 v6.1 GeoTIFF
    cmip6:       "data/cmip6/"          # 6 GCMs x 2 SSPs NetCDF
    dgre:        "data/dgre/wells.csv"  # 187 piezometric wells
    srtm:        "data/static/srtm_1km_tunisia.tif"
    lithology:   "data/static/lithology_tunisia.shp"
    landuse:     "data/static/fromglc2022_tunisia.tif"
  outputs:
    processed:   "outputs/processed/"
    models:      "outputs/models/"
    results:     "outputs/results/"
    figures:     "outputs/figures/"
    logs:        "outputs/logs/"

# ── Study area ────────────────────────────────────────────────────────────────
study_area:
  lon_min: 7.5
  lon_max: 11.6
  lat_min: 30.0
  lat_max: 37.5
  crs: "EPSG:4326"
  zones:
    north:
      name: "Northern Zone"
      governorates: ["Bizerte","Béja","Jendouba","Kef","Siliana","Tunis",
                     "Ariana","Ben Arous","Manouba","Nabeul","Zaghouan"]
    central:
      name: "Central Zone"
      governorates: ["Kairouan","Kasserine","Sidi Bouzid","Sousse",
                     "Monastir","Mahdia","Sfax"]
    south:
      name: "Southern Zone"
      governorates: ["Gafsa","Tozeur","Kebili","Gabès","Médenine","Tataouine"]

# ── Time periods ──────────────────────────────────────────────────────────────
time:
  start:              "2002-04-01"
  end:                "2024-12-01"
  baseline_start:     "2004-01-01"
  baseline_end:       "2009-12-01"
  grace_end:          "2017-06-01"
  grace_fo_start:     "2018-06-01"
  gap_start:          "2017-07-01"    # GRACE inter-mission gap
  gap_end:            "2018-05-01"
  train_start:        "2002-01-01"
  train_end:          "2022-12-01"    # for prediction models
  val_start:          "2023-01-01"
  val_end:            "2024-12-01"
  class_train_end:    "2018-12-01"    # for classification RF
  projection_start:   "2025-01-01"
  projection_end:     "2030-12-01"

# ── GRACE preprocessing ───────────────────────────────────────────────────────
grace:
  mascons:
    - name: "CSR"
      file_pattern: "CSR_GRACE_GRACE-FO_RL06_Mascons_all-corrections_v02.nc"
    - name: "JPL"
      file_pattern: "JPL_GRACE_GRACE-FO_RL06M_v02_*.nc"
    - name: "GFZ"
      file_pattern: "GFZ_GRACE_GRACE-FO_Level-3_version_0300_*.nc"
  resolution: 0.25           # degrees
  land_mask_threshold: 0.50  # minimum land fraction per pixel (-> 148 pixels)
  min_wells_per_pixel: 3     # minimum DGRE wells for validation (-> 112 pixels)

# ── Gap filling ───────────────────────────────────────────────────────────────
gap_filling:
  method: "lstm_bcnn"
  train_years: [2002, 2016]
  sequence_length: 24
  n_epochs: 100
  batch_size: 32
  patience: 10
  n_seeds: 5
  compare_methods: ["linear", "arima", "kalman"]

# ── Downscaling ───────────────────────────────────────────────────────────────
downscaling:
  target_resolution_km: 1
  model: "random_forest"
  train_end: "2018-12-01"
  val_start: "2019-01-01"
  n_estimators: [100, 200, 300]
  max_depth: [5, 10, 15, 20]
  min_samples_leaf: [1, 2, 4]
  physical_consistency_threshold: 0.3   # cm EWH max aggregation error
  benchmark_linear: true

# ── NDVI emulator ─────────────────────────────────────────────────────────────
ndvi_emulator:
  model: "random_forest"
  predictors: ["P", "T2m", "LAI"]
  train_end: "2022-12-01"
  val_start: "2023-01-01"
  scenarios: ["ssp245", "ssp585"]
  n_estimators: 200
  max_depth: 10

# ── Trend detection ───────────────────────────────────────────────────────────
trend:
  method: "modified_mann_kendall"
  alpha: 0.05
  max_lag: 12           # autocorrelation lags to correct
  prewhitening: true    # Yue 2002
  variables: ["gwsa", "precipitation", "temperature", "ndvi"]

# ── Water stress classification ───────────────────────────────────────────────
classification:
  features: ["gwsa_anomaly", "precip_anomaly", "temp_anomaly", "ndvi_anomaly"]
  # K-Means (exploratory)
  kmeans:
    k: 4
    n_bootstrap: 1000
    labels: ["low", "moderate", "high", "critical"]
    thresholds_m_yr: [0.2, 0.5, 1.0]   # drawdown rate thresholds
  # Random Forest (primary)
  rf:
    n_estimators_range: [50, 100, 200, 300, 500]
    max_depth_range: [3, 5, 10, 15, 20]
    min_samples_leaf_range: [1, 2, 5, 10]
    cv: "loocv"
    n_jobs: -1
    random_state: 42

# ── Prediction ────────────────────────────────────────────────────────────────
prediction:
  scenarios: ["ssp245", "ssp585"]
  gcms: ["IPSL-CM6A-LR", "MPI-ESM1-2-HR", "EC-Earth3",
         "CNRM-CM6-1", "MRI-ESM2-0", "ACCESS-CM2"]
  uncertainty_interval: 0.90   # 90% prediction interval

  # SARIMAX baseline
  sarimax:
    order: [1, 1, 1]
    seasonal_order: [1, 1, 1, 12]

  # LSTM
  lstm:
    sequence_length: 24
    n_features: 16
    layers: [64, 32]
    dropout: 0.2
    l2_lambda: 0.0001
    grad_clip_norm: 1.0
    n_epochs: 100
    batch_size: 32
    patience: 10
    optimizer: "adam"
    loss: "mse"
    n_seeds: 10
    optuna_trials: 50
    cv_folds: 5

  # XGBoost
  xgboost:
    window_size: 12
    n_features: 16
    cv_folds: 5
    param_grid:
      n_estimators: [100, 200, 500]
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.05, 0.1]
      subsample: [0.8, 1.0]
      colsample_bytree: [0.8, 1.0]

# ── CMIP6 bias correction ─────────────────────────────────────────────────────
bias_correction:
  method: "quantile_mapping"
  reference: "era5"
  apply_per: ["month", "zone", "variable"]

# ── Dask cluster ──────────────────────────────────────────────────────────────
dask:
  n_workers: 4          # adjust to your machine
  threads_per_worker: 2
  memory_limit: "8GB"   # per worker

# ── Reproducibility ───────────────────────────────────────────────────────────
random_state: 42
